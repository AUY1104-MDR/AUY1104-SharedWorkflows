name: Subir API a Docker Hub

on:
  workflow_call:
    inputs:
      image-name:
        description: Cómo se llamará nuestra imagen en Docker Hub (solo nombre, sin el usuario)
        required: true
        type: string
      image-tag:
        description: Etiqueta que identifica esta versión (Ej. identificador del commit)
        required: true
        type: string
    secrets:
      DOCKER_USERNAME:
        required: true
      DOCKER_PASSWORD:
        required: true

  workflow_dispatch:
    inputs:
      image-name:
        description: Nombre corto de la imagen (ej. mi-api-academica)
        required: true
        type: string
      image-tag:
        description: Etiqueta de esta version (ej. v1.0.0)
        required: true
        type: string

jobs:
  # Etapa 1 · Instalar dependencias y ejecutar tests
  deps-and-test:
    name: Dependencies and tests
    runs-on: ubuntu-latest
    steps:
      - name: 1 · Descargar el código del repositorio
        uses: actions/checkout@v4

      - name: 2 · Instalar dependencias
        run: npm install

      - name: 3 · Ejecutar tests
        run: npm test

  # Etapa 2 · Solo corre si la etapa anterior terminó bien
  build-and-push:
    name: Build and push Docker image
    needs: deps-and-test
    runs-on: ubuntu-latest
    steps:
      # Paso 1 · Traer el código a la máquina temporal del workflow
      - name: 1 · Descargar el código del repositorio
        uses: actions/checkout@v4

      # Paso 2 · Iniciar sesión en Docker Hub
      - name: 2 · Iniciar sesión en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Paso 3 · Construir la imagen y subir las etiquetas
      - name: 3 · Armar la imagen y publicarla
        run: |
          # Nombre completo en Docker Hub: usuario/nombre-de-la-imagen
          IMAGEN_COMPLETA="${{ secrets.DOCKER_USERNAME }}/${{ inputs.image-name }}"

          # Una sola construcción, dos etiquetas: la de esta versión y "latest"
          docker build \
            -t "${IMAGEN_COMPLETA}:${{ inputs.image-tag }}" \
            -t "${IMAGEN_COMPLETA}:latest" \
            .

          # Sube a Docker Hub todas las etiquetas que acabamos de crear para esta imagen
          docker push --all-tags "${IMAGEN_COMPLETA}"