name: Run Hello World and LS

on:
  push:
  workflow_dispatch:
  workflow_call:
  secrets: 
    DOCKER_USERNAME: 
      required: true
    DOCKER_PASSWORD:
      required: true


jobs:
  run-inline-script:
    runs-on: ubuntu-latest
    steps:

      #  1. Checout del código

      - name: Checkout
        uses: actions/checkout@v4

      #  2. Credenciales de Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}